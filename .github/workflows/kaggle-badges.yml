name: Kaggle Badges
on:
  schedule:
    - cron: '0 0 * * *' # Her gün gece yarısı
  workflow_dispatch:
jobs:
  update-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome@131.0.6778.85
      - uses: spider-man-tm/kaggle-badges@v1.3.0
        with:
          user_name: "n4yuc4"
      - name: Debug - List files
        run: ls -R
      - name: Commit and Push badges
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add kaggle-badges.svg
          git commit -m "docs: update kaggle badges [skip ci]" || echo "No changes to commit"
          git push
